name: Update Product Lists via Python

on:
  issues:
    types: [opened]

jobs:
  run-python-script:
    # Only run if the issue title starts with "UPDATE_LIST:"
    if: startsWith(github.event.issue.title, 'UPDATE_LIST:')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests

      - name: Execute Python script
        env:
          APP_GITHUB_TOKEN: ${{ secrets.APP_GITHUB_TOKEN }}
        run: python save_list.py

      - name: Close Issue Automatically
        uses: peter-evans/close-issue@v3
        with:
          comment: "Auto-processed by Python script."

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Samsung Product Stock Checker</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      max-width: 900px;
      margin: 40px auto;
      padding: 0 20px;
      color: #333;
    }
    h2 { margin-bottom: 8px; }
    p { color: #666; margin-top: 0; }
    textarea {
      width: 100%;
      height: 150px;
      padding: 10px;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-family: monospace;
      font-size: 14px;
    }
    .btn-group {
      margin: 16px 0;
      display: flex;
      gap: 10px;
    }
    button {
      background-color: #0071e3;
      color: white;
      border: none;
      padding: 10px 18px;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      font-weight: 500;
    }
    button:hover { background-color: #005bb5; }
    button.secondary {
      background-color: #f5f5f7;
      color: #333;
      border: 1px solid #ccc;
    }
    button.secondary:hover { background-color: #e5e5e7; }
    button:disabled {
      background-color: #ccc;
      cursor: not-allowed;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }
    th, td {
      border: 1px solid #e0e0e0;
      padding: 10px 14px;
      text-align: left;
    }
    th {
      background-color: #f9f9fb;
      font-weight: 600;
    }
    tr:nth-child(even) { background-color: #fafafa; }
    .status-badge {
      font-weight: bold;
      font-size: 12px;
      padding: 2px 6px;
      border-radius: 4px;
    }
    .status-ok { background: #e6f4ea; color: #137333; }
    .status-err { background: #fce8e6; color: #c5221f; }
  </style>
</head>
<body>

  <h2>Samsung Stock Checker</h2>
  <p>Paste product codes (one per line or directly from Excel):</p>

  <textarea id="productInput" placeholder="SM-F9760ZKPTGY&#10;SM-S928BZDAGTO"></textarea>

  <div class="btn-group">
    <button id="fetchBtn" onclick="checkStock()">Fetch Stock Levels</button>
    <button id="copyBtn" class="secondary" onclick="copyResults()" disabled>Copy Table for Excel</button>
  </div>

  <table id="resultTable" style="display: none;">
    <thead>
      <tr>
        <th>Product Code</th>
        <th>Stock Level</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>

  <script>
    async function checkStock() {
      const input = document.getElementById('productInput').value;
      const lines = input.split(/\r?\n/).map(s => s.trim()).filter(Boolean);
      
      if (lines.length === 0) {
        alert('Please paste at least one product code.');
        return;
      }

      const fetchBtn = document.getElementById('fetchBtn');
      const copyBtn = document.getElementById('copyBtn');
      const table = document.getElementById('resultTable');
      const tbody = document.getElementById('tableBody');

      fetchBtn.disabled = true;
      fetchBtn.textContent = 'Fetching...';
      tbody.innerHTML = '';
      table.style.display = 'table';

      for (const code of lines) {
        const row = document.createElement('tr');
        row.innerHTML = `<td>${code}</td><td>Loading...</td><td><span class="status-badge">...</span></td>`;
        tbody.appendChild(row);

        try {
          const targetUrl = `https://shop.samsung.com/tokocommercewebservices/v2/hk_en/products/${encodeURIComponent(code)}`;
          
          // Use CORS proxy if direct browser request gets blocked by CORS policies
          const response = await fetch(targetUrl);

          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }

          const xmlText = await response.text();
          const parser = new DOMParser();
          const xmlDoc = parser.parseFromString(xmlText, "text/xml");
          
          const stockNode = xmlDoc.querySelector("stockLevel");
          const stock = stockNode ? stockNode.textContent : 'Not found';

          row.cells[1].textContent = stock;
          row.cells[2].innerHTML = `<span class="status-badge status-ok">Success</span>`;
        } catch (err) {
          row.cells[1].textContent = 'N/A';
          row.cells[2].innerHTML = `<span class="status-badge status-err">Failed / CORS Error</span>`;
        }
      }

      fetchBtn.disabled = false;
      fetchBtn.textContent = 'Fetch Stock Levels';
      copyBtn.disabled = false;
    }

    function copyResults() {
      const rows = document.querySelectorAll('#tableBody tr');
      let tsv = 'Product Code\tStock Level\n';

      rows.forEach(row => {
        const code = row.cells[0].textContent;
        const stock = row.cells[1].textContent;
        tsv += `${code}\t${stock}\n`;
      });

      navigator.clipboard.writeText(tsv).then(() => {
        alert('Copied to clipboard! You can now paste directly into Excel.');
      }).catch(err => {
        alert('Failed to copy: ' + err);
      });
    }
  </script>
</body>
</html>
